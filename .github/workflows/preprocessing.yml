name: Automated Preprocessing

on:
  push:
    paths:
      - 'dataset_raw/**'
      - 'preprocessing/automate_bayu.py'
  workflow_dispatch:

jobs:
  build-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Automation Script
        run: |
          cd preprocessing
          python automate_bayu.py

      - name: Commit and Push Processed Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dataset_preprocessing/
          git commit -m "Automated data preprocessing update" || echo "No changes to commit"
          git push